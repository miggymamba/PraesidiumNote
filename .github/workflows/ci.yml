name: PraesidiumNote CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Silences the Node.js 20 deprecation warning (Mandatory by June 16, 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # This automatically handles caching of the Gradle User Home
          # and project-level cache, significantly speeding up subsequent builds.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        # Runs Android Lint to catch structural/formatting issues early.
        run: ./gradlew lintDebug --stacktrace

      - name: Unit Tests
        # Runs local JVM unit tests (MockK/JUnit).
        # This verifies Domain and ViewModel logic.
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: UI Tests (Instrumentation)
        # Spins up an emulator to run Compose UI tests.
        # Uses API 29 (Android 10) as it is the most stable x86_64 image on GitHub runners.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-boot-timeout: 600
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload Test Reports
        # Extracts the test results even if the tests fail so you can actually debug them
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-instrumentation-reports
          path: app/build/reports/androidTests/connected/

      - name: Build Debug APK
        # Ensures the app actually compiles (catches Dagger/Hilt codegen errors).
        run: ./gradlew assembleDebug --stacktrace