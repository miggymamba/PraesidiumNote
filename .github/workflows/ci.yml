name: PraesidiumNote CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Silences the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        # Clears ~20GB of bloat to ensure the emulator has room to boot
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        run: ./gradlew lintDebug --stacktrace

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: UI Tests (Instrumentation)
        # Utilizes a stable API level and x86_64 architecture for reliable Linux execution.
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          disable-animations: true
          emulator-boot-timeout: 600
          # Standard stable options for headless execution on Linux runners.
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-instrumentation-reports
          path: app/build/reports/androidTests/connected/

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
